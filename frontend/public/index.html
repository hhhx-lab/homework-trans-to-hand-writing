<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description" content="个人私有的作业文档转手写体工作台，支持文档抽取、公式整理、手写预览以及 PDF/Word 导出。">
    <meta name="keywords" content="手写体,作业文档,Markdown,公式整理,PDF导出,Word导出,私有工具">
    <meta name="author" content="hhhx-lab">
    <meta name="robots" content="noindex, nofollow">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="http://localhost:8080/">
    <meta property="og:title" content="作业文档转手写体工作台">
    <meta property="og:description" content="个人私有的作业文档转手写体工具，支持文档抽取、公式整理、手写预览以及 PDF/Word 导出。">
    <meta property="og:image" content="/default1.webp">
    <meta property="og:locale" content="zh_CN">
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="http://localhost:8080/">
    <meta property="twitter:title" content="作业文档转手写体工作台">
    <meta property="twitter:description" content="个人私有的作业文档转手写体工具，支持文档抽取、公式整理、手写预览以及 PDF/Word 导出。">
    <meta property="twitter:image" content="/default1.webp">

    <!-- 结构化数据 JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "作业文档转手写体工作台",
      "url": "http://localhost:8080/",
      "description": "个人私有的作业文档转手写体工具，支持文档抽取、公式整理、手写预览以及 PDF/Word 导出。",
      "image": "http://localhost:8080/default1.webp",
      "inLanguage": "zh-CN",
      "publisher": {
        "@type": "Organization",
        "name": "hhhx-lab"
      }
    }
    </script>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="<%= BASE_URL %>favicon.ico">
    <link rel="icon" type="image/svg+xml" href="<%= BASE_URL %>icon.svg">
    <link rel="shortcut icon" href="<%= BASE_URL %>icon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="<%= BASE_URL %>favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="<%= BASE_URL %>favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="96x96" href="<%= BASE_URL %>favicon-96x96.png">
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="<%= BASE_URL %>apple-touch-icon.png">

    <!-- Android Chrome Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="<%= BASE_URL %>web-app-manifest-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="<%= BASE_URL %>web-app-manifest-512x512.png">

    <!-- <title><%= htmlWebpackPlugin.options.title %></title> -->
    <title>作业文档转手写体工作台</title>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
